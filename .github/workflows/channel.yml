name: daily-channel

# Posts a premium daily mix (a rotating tip + ~10 diverse jobs + join CTA) to
# the public Telegram channel. Once a day.
on:
  schedule:
    - cron: "0 0,7-23 * * *"   # hourly 07:00–00:00 UTC; quiet 01:00–06:00
  workflow_dispatch: {}

concurrency:
  group: daily-channel
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: "true"
      PYTHONIOENCODING: "utf-8"
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHANNEL: ${{ secrets.TELEGRAM_CHANNEL }}
      DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
      BOT_USERNAME: ${{ secrets.BOT_USERNAME }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_KV_NAMESPACE_ID: ${{ secrets.CF_KV_NAMESPACE_ID }}
      CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - run: pip install requests python-dotenv
      - name: Post to channel
        run: python scripts/run_channel.py
